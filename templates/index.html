<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة طلبات أبو الأكبر 🚀</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Tajawal', sans-serif; }
        .navbar { background: #212529; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .order-card { border-right: 6px solid #ffc107; transition: 0.3s; }
        .order-card:hover { transform: scale(1.01); }
        .btn-warning { font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand h1 text-warning">🚀 لوحة تحكم أبو الأكبر (النظام الذكي)</span>
            <button class="btn btn-outline-danger btn-sm" onclick="resetAll()">تصفير اليومية 🗑️</button>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- إدخال الطلب بالرسالة الواحدة -->
            <div class="col-md-5">
                <div class="card p-3 mb-4">
                    <h5 class="card-title border-bottom pb-2">📝 إضافة طلب (لصق رسالة)</h5>
                    <p class="text-muted small">ألصق الطلبية بالكامل هنا. سأقوم باستخراج المنطقة والرقم والمنتجات آلياً.</p>
                    <form id="bulk-order-form">
                        <textarea id="raw_text" class="form-control mb-3" rows="10" placeholder="مثال:&#10;حي العسكري&#10;07712345678&#10;سمك كيلو&#10;طماطم 2 كيلو" required></textarea>
                        <button type="submit" class="btn btn-warning w-100">إضافة الطلب للنظام 📤</button>
                    </form>
                </div>
            </div>

            <!-- قائمة الطلبات النشطة -->
            <div class="col-md-7">
                <h5 class="mb-3">📋 الطلبات الحالية</h5>
                <div id="orders-list"></div>
            </div>
        </div>
    </div>

    <!-- موديل التسعير -->
    <div class="modal fade" id="priceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning"><h5 class="modal-title">💰 تسعير الطلب: <span id="modal-title"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div id="product-pricing-list"></div>
                    <hr>
                    <div class="bg-light p-3 rounded">
                        <label class="fw-bold mb-2">🏪 عدد المحلات؟</label>
                        <select id="places-count" class="form-select mb-3">
                            <option value="1">1 محلات</option><option value="2">2 محلات</option>
                            <option value="3">3 محلات (+1 ألف)</option><option value="4">4 محلات (+2 ألف)</option>
                            <option value="5">5 محلات (+3 ألف)</option>
                        </select>
                        <button class="btn btn-success w-100" onclick="finalizeOrder()">حفظ الفاتورة نهائياً ✅</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentOrderId = '';
        let ordersData = {};

        async function fetchAll() {
            const res = await fetch('/api/orders');
            ordersData = await res.json();
            const list = document.getElementById('orders-list');
            list.innerHTML = '';

            for (const id in ordersData.orders) {
                const order = ordersData.orders[id];
                const pricing = ordersData.pricing[id] || {};
                const inv = ordersData.invoice_numbers[id];

                list.innerHTML += `
                    <div class="card p-3 mb-3 order-card">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-1">📍 ${order.title} <small class="text-muted" style="font-size:0.7rem">#${inv}</small></h5>
                            <button class="btn btn-sm btn-primary" onclick="openPricing('${id}')">تسعير 💸</button>
                        </div>
                        <p class="text-muted small mb-2">📞 ${order.phone_number}</p>
                        <div class="d-flex flex-wrap">
                            ${order.products.map(p => {
                                const isPriced = pricing[p] && pricing[p].sell;
                                return `<span class="badge ${isPriced ? 'bg-success' : 'bg-light text-dark border'} me-1 mb-1">${p}</span>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
        }

        function openPricing(id) {
            currentOrderId = id;
            const order = ordersData.orders[id];
            const pricing = ordersData.pricing[id];
            document.getElementById('modal-title').innerText = order.title;
            const container = document.getElementById('product-pricing-list');
            container.innerHTML = '';

            order.products.forEach(p => {
                const pData = pricing[p] || {buy: '', sell: ''};
                container.innerHTML += `
                    <div class="mb-3 p-2 border rounded">
                        <div class="fw-bold mb-1">${p}</div>
                        <div class="row g-2">
                            <div class="col-6"><input type="number" class="form-control" placeholder="🫳🏻 شراء" id="buy-${p}" value="${pData.buy}"></div>
                            <div class="col-6"><input type="number" class="form-control" placeholder="🫴🏻 بيع" id="sell-${p}" value="${pData.sell}"></div>
                        </div>
                        <button class="btn btn-warning btn-sm w-100 mt-2" onclick="savePrice('${p}')">حفظ 💾</button>
                    </div>
                `;
            });
            new bootstrap.Modal(document.getElementById('priceModal')).show();
        }

        async function savePrice(product) {
            const buy = document.getElementById(`buy-${product}`).value;
            const sell = document.getElementById(`sell-${product}`).value;
            await fetch('/api/update_price', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({order_id: currentOrderId, product, buy, sell})
            });
            fetchAll();
        }

        async function finalizeOrder() {
            const places = document.getElementById('places-count').value;
            await fetch('/api/finalize', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({order_id: currentOrderId, places_count: places})
            });
            bootstrap.Modal.getInstance(document.getElementById('priceModal')).hide();
            fetchAll();
        }

        async function resetAll() {
            if(confirm('هل تريد تصفير كافة طلبات اليوم؟')) {
                await fetch('/api/reset', {method: 'POST'});
                fetchAll();
            }
        }

        document.getElementById('bulk-order-form').onsubmit = async (e) => {
            e.preventDefault();
            const raw_text = document.getElementById('raw_text').value;
            const res = await fetch('/api/add_order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({raw_text})
            });
            if(res.ok) {
                document.getElementById('raw_text').value = '';
                fetchAll();
            } else {
                const err = await res.json();
                alert(err.message);
            }
        };

        fetchAll();
        setInterval(fetchAll, 10000);
    </script>
</body>
</html>
